name: Auto Restart Bot

on:
  push:
    branches: [ main, master ]
    paths:
      - 'bot.py'
      - 'command_parser.py'
      - 'delete_manager.py'
      - 'secure_data_manager.py'
      - 'smart_memory_handler.py'
      - 'smart_reminder.py'
      - 'voice_note_handler.py'
      - 'requirements.txt'

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Trigger Restart via Webhook
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Accept: application/json" || true
          
          curl -X POST "https://api.railway.app/v1/deploy/${{ secrets.RAILWAY_DEPLOY_HOOK }}" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" || true
      
      - name: Log restart time
        run: |
          echo "✅ Bot auto-restart triggered at $(date)"
          echo "📝 Updated files: ${{ github.event.head_commit.modified }}"
