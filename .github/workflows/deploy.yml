name: Deploy Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# IMPORTANT: Cancel previous running workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Vosk Model
      id: cache-vosk
      uses: actions/cache@v3
      with:
        path: vosk-model-small-hi-0.22
        key: vosk-model-small-hi-0.22-v1

    - name: Download Vosk Model (first time only)
      if: steps.cache-vosk.outputs.cache-hit != 'true'
      run: |
        echo "📥 Downloading Vosk model..."
        wget -q https://alphacephei.com/vosk/models/vosk-model-small-hi-0.22.zip
        unzip -q vosk-model-small-hi-0.22.zip
        rm vosk-model-small-hi-0.22.zip
        echo "✅ Vosk model ready"

    # CRITICAL: Kill all previous bot processes
    - name: Kill all previous bot instances
      run: |
        echo "🔪 Killing all previous Python bot processes..."
        sudo pkill -9 -f "python.*main.py" || true
        sudo pkill -9 -f "python.*bot.py" || true
        sudo pkill -9 -f "python.*voice" || true
        sudo killall -9 python3 || true
        sleep 5

    # CRITICAL: Force delete webhook
    - name: Force delete webhook
      run: |
        echo "🗑️ Deleting old webhook..."
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/deleteWebhook?drop_pending_updates=true"
        sleep 3

    # CRITICAL: Get a new unique session
    - name: Run bot with fresh session
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GB_TOKEN: ${{ secrets.GB_TOKEN }}
        PRIVATE_REPO_URL: ${{ secrets.PRIVATE_REPO_URL }}
        GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        SHEET_KEY: ${{ secrets.SHEET_KEY }}
        DELETE_PASSWORD: ${{ secrets.DELETE_PASSWORD }}
        VOSK_MODEL_PATH: ${{ github.workspace }}/vosk-model-small-hi-0.22
      run: |
        echo "🚀 Starting bot..."
        python main.py 2>&1 | tee bot.log &
        
        # Keep workflow alive
        sleep infinity
