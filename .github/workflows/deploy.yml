name: Deploy Bot with Offline Voice

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Vosk Model (GitHub Actions path)
      run: |
        # Download model to current directory
        wget -q https://alphacephei.com/vosk/models/vosk-model-small-hi-0.22.zip
        unzip -q vosk-model-small-hi-0.22.zip
        rm vosk-model-small-hi-0.22.zip
        ls -la vosk-model-small-hi-0.22/
        
        # Set environment variable for model path
        echo "VOSK_MODEL_PATH=$(pwd)/vosk-model-small-hi-0.22" >> $GITHUB_ENV

    - name: Kill previous bot instance
      run: |
        pkill -f "python.*bot.py" || true
        pkill -f "python.*main.py" || true
        sleep 3

    - name: Delete webhook (fix conflict)
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/deleteWebhook?drop_pending_updates=true"
        sleep 2

    - name: Run bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GB_TOKEN: ${{ secrets.GB_TOKEN }}
        PRIVATE_REPO_URL: ${{ secrets.PRIVATE_REPO_URL }}
        GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        SHEET_KEY: ${{ secrets.SHEET_KEY }}
        DELETE_PASSWORD: ${{ secrets.DELETE_PASSWORD }}
        VOSK_MODEL_PATH: ${{ github.workspace }}/vosk-model-small-hi-0.22
      run: |
        # Verify model exists
        echo "VOSK_MODEL_PATH=$VOSK_MODEL_PATH"
        ls -la $VOSK_MODEL_PATH || echo "Model not found!"
        
        # Run bot
        python main.py
