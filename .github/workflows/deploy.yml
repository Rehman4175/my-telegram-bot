name: Deploy Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install -r requirements.txt

    - name: Cache Vosk Model
      id: cache-vosk
      uses: actions/cache@v3
      with:
        path: vosk-model-small-hi-0.22
        key: ${{ runner.os }}-vosk-model-v1

    - name: Download Vosk Model
      if: steps.cache-vosk.outputs.cache-hit != 'true'
      run: |
        wget -q https://alphacephei.com/vosk/models/vosk-model-small-hi-0.22.zip
        unzip -q vosk-model-small-hi-0.22.zip
        rm vosk-model-small-hi-0.22.zip

    - name: Kill old instance (IMPORTANT!)
      run: |
        # Kill any existing bot process
        sudo pkill -f "python.*bot.py" || true
        sudo pkill -f "python.*main.py" || true
        sleep 5

    - name: Run bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GB_TOKEN: ${{ secrets.GB_TOKEN }}
        PRIVATE_REPO_URL: ${{ secrets.PRIVATE_REPO_URL }}
        GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        SHEET_KEY: ${{ secrets.SHEET_KEY }}
        DELETE_PASSWORD: ${{ secrets.DELETE_PASSWORD }}
        VOSK_MODEL_PATH: ${{ github.workspace }}/vosk-model-small-hi-0.22
      run: |
        # Delete webhook (prevents conflict)
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/deleteWebhook?drop_pending_updates=true"
        
        # Add small delay
        sleep 3
        
        # Run with polling but single instance
        python bot.py
